name: Update README on Commit

permissions:
  contents: write

on:
  push:
    branches:
      - '**'

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get last commit message and description
        id: commit
        run: |
          AUTHOR=$(git log -1 --pretty=format:'%an')
          COMMIT_MSG=$(git log -1 --pretty=%s)
          COMMIT_DESC=$(git log -1 --pretty=%b)

          # Skip if commit publish branch or merge commit into develop
          if [[ "$COMMIT_MSG" == "Publish branch"* ]]; then
              echo "Skipping publish branch commit"
              exit 0
          fi

         if [[ "$GITHUB_REF" == "refs/heads/develop" ]] && [[ "$COMMIT_MSG" =~ ^Merge ]]; then
            echo "Skipping merge commit into develop"
            exit 0
          fi

          # Escape special characters for GitHub Actions env
          COMMIT_MSG="${COMMIT_MSG//'%'/'%25'}"
          COMMIT_MSG="${COMMIT_MSG//$'\n'/'%0A'}"
          COMMIT_MSG="${COMMIT_MSG//$'\r'/'%0D'}"
          COMMIT_MSG="${COMMIT_MSG//:/'%3A'}"

          COMMIT_DESC="${COMMIT_DESC//'%'/'%25'}"
          COMMIT_DESC="${COMMIT_DESC//$'\n'/'%0A'}"
          COMMIT_DESC="${COMMIT_DESC//$'\r'/'%0D'}"
          COMMIT_DESC="${COMMIT_DESC//:/'%3A'}"

          echo "msg=$COMMIT_MSG" >> $GITHUB_ENV
          echo "desc=$COMMIT_DESC" >> $GITHUB_ENV

      - name: Append commit details to README.md
        run: |
          MSG=$(echo "${{ env.msg }}" | sed 's/%0A/\n/g' | sed 's/%3A/:/g' | sed 's/%25/%/g')
          DESC=$(echo "${{ env.desc }}" | sed 's/%0A/\n/g' | sed 's/%3A/:/g' | sed 's/%25/%/g')
          {
              echo ""
              echo "## **$MSG**"
              echo ""
              echo "$DESC"
              echo ""
          } >> README.md

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Update README with commit: ${{ env.msg }}" || echo "No changes to commit"
          git push
